appId: com.soulquad.app
productName: SoulQuad
copyright: Copyright © 2026 SoulQuad

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

directories:
  output: release-electron2
  buildResources: build

files:
  - dist/**/*
  - server/**/*
  - electron/**/*
  - package.json
  - "!**/node_modules/**/*"
  - node_modules/sql.js/**/*
  - node_modules/express/**/*
  - node_modules/cors/**/*
  - node_modules/socket.io/**/*
  - node_modules/socket.io-client/**/*
  - node_modules/uuid/**/*
  - node_modules/mime/**/*
  - node_modules/compression/**/*
  - node_modules/connect-history-api-fallback/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/debug/**/*
  - node_modules/ms/**/*
  - node_modules/engine.io-parser/**/*
  - node_modules/accepts/**/*
  - node_modules/base64id/**/*
  - node_modules/cookie/**/*
  - node_modules/debug/**/*
  - node_modules/engine.io/**/*
  - node_modules/ms/**/*
  - node_modules/socket.io-parser/**/*
  - node_modules/parseqs/**/*
  - node_modules/parseurl/**/*
  - node_modules/toarray/**/*
  - node_modules/ws/**/*

extraMetadata:
  main: electron/main.js

win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: SoulQuad-${version}-win-x64.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - dmg
  artifactName: SoulQuad-${version}-mac.dmg

linux:
  target:
    - AppImage
  artifactName: SoulQuad-${version}-linux-x64.AppImage